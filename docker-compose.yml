services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-insight}
      POSTGRES_USER: ${DB_USER:-insight_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-insight_user} -d ${DB_NAME:-insight}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-insight}
      DB_USER: ${DB_USER:-insight_user}
      DB_PASSWORD: ${DB_PASSWORD}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:8080/auth/callback}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      TEST_LOGIN_ENABLED: ${TEST_LOGIN_ENABLED:-false}
      TEST_LOGIN_GITHUB_ID: ${TEST_LOGIN_GITHUB_ID:-test-user}
      TEST_LOGIN_EMAIL: ${TEST_LOGIN_EMAIL:-test-user@example.local}
      TEST_LOGIN_DISPLAY_NAME: ${TEST_LOGIN_DISPLAY_NAME:-Test User}
      TEST_LOGIN_AVATAR_URL: ${TEST_LOGIN_AVATAR_URL:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
