server.port=8080

# GitHub Personal Access Token (선택사항)
github.token=${GITHUB_TOKEN:}

# GitHub OAuth 2.0 설정 (UC-00: OAuth 로그인)
github.oauth.client-id=${GITHUB_OAUTH_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/auth/callback}
github.oauth.session-timeout-minutes=30

# H2 데이터베이스 설정
spring.datasource.url=jdbc:h2:file:./data/insight;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔 설정 (개발/운영 환경 구분)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# 정적 리소스 캐시 비활성화 (개발 환경)
spring.web.resources.cache.period=0
spring.web.resources.chain.enabled=false

# 로그 레벨
logging.level.com.github.insight=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG
