# 로컬 개발 환경 설정

# 프로파일 활성화
spring.profiles.active=local

# H2 데이터베이스 (파일 기반, 자동 생성)
spring.datasource.url=jdbc:h2:file:./data/insight;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔 활성화 (데이터 조회/관리용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 로깅
logging.level.com.github.insight=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# 서버 포트
server.port=8080

# GitHub OAuth 설정 (개발용 - 실제 값은 환경 변수로 설정)
github.oauth.client-id=${GITHUB_OAUTH_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/auth/callback}
github.oauth.session-timeout-minutes=30

# GitHub Personal Access Token (선택사항)
github.token=${GITHUB_TOKEN:}

# 정적 리소스 캐시 비활성화 (개발 환경)
spring.web.resources.cache.period=0
spring.web.resources.chain.enabled=false
