# 로컬 개발 환경 설정

# ========================================
# H2 데이터베이스 설정
# ========================================
# H2 데이터베이스 (파일 기반, PostgreSQL 호환 모드)
spring.datasource.url=jdbc:h2:file:./data/insight;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔 활성화 (데이터 조회/관리용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# JPA/Hibernate 설정
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL 초기화 (자동으로 schema.sql 실행)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:schema.sql

# ========================================
# 로깅
# ========================================
logging.level.com.github.insight=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.boot.sql.init=INFO

# ========================================
# 서버 설정
# ========================================
server.port=8080

# ========================================
# GitHub OAuth 설정 (개발용 - 실제 값은 환경 변수로 설정)
# ========================================
github.oauth.client-id=${GITHUB_OAUTH_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/auth/callback}
github.oauth.session-timeout-minutes=30
github.oauth.cookie-secure=${GITHUB_OAUTH_COOKIE_SECURE:false}
github.oauth.cookie-same-site=${GITHUB_OAUTH_COOKIE_SAME_SITE:Lax}

# GitHub Personal Access Token (선택사항)
github.token=${GITHUB_TOKEN:}

# ========================================
# CORS 설정 (로컬 개발: 모든 오리진 허용)
# ========================================
cors.allowed-origins=*

# ========================================
# 정적 리소스 설정
# ========================================
# 정적 리소스 캐시 비활성화 (개발 환경)
spring.web.resources.cache.period=0
spring.web.resources.chain.enabled=false
spring.web.resources.static-locations=classpath:/static/,classpath:/public/
