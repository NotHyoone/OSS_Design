server.port=8080

# ========================================
# PostgreSQL 데이터베이스 설정
# ========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:insight}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# 커넥션 풀 설정
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ========================================
# JPA/Hibernate 설정
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# SQL 초기화
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:schema.sql

# ========================================
# 정적 리소스 캐시
# ========================================
# 정적 리소스 캐시 비활성화 (개발 환경)
spring.web.resources.cache.period=0
spring.web.resources.chain.enabled=false
spring.web.resources.static-locations=classpath:/static/,classpath:/public/

# ========================================
# 로그 레벨
# ========================================
logging.level.com.github.insight=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG

# ========================================
# GitHub OAuth 2.0 설정
# ========================================
github.oauth.client-id=${GITHUB_OAUTH_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/auth/callback}
github.oauth.session-timeout-minutes=30

# ========================================
# GitHub Personal Access Token (선택사항)
# ========================================
github.token=${GITHUB_TOKEN:}
